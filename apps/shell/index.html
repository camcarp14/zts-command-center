<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0B0F1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "black" (opaque, below the status bar), NOT "black-translucent":
         iOS half-applies "black-translucent" in standalone — it sizes the window
         below the status bar yet anchors it at the top, leaving a dead ~59pt
         letterbox at the BOTTOM, which floated the fixed bottom nav above the
         real screen edge. "black" gives an opaque, below-status-bar window whose
         bottom reaches the physical edge (no letterbox) with a black bar + white
         glyphs — seamless over the #0B0F1A canvas. NOTE: iOS reads this only at
         Add-to-Home-Screen time — an already-installed icon must be removed and
         re-added for the change to take effect. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Pentagon" />
    <title>The Pentagon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html, body, #root { margin: 0; height: 100%; }
      body { background: #0b0d12; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
