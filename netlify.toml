[build]
  command = "npm install && npm run build"
  publish = "apps/shell/dist"

[build.environment]
  NODE_VERSION = "20"
  # The Supabase anon key + URL are public by design (anon tier, RLS-protected)
  # and Vite legitimately bakes them into the client bundle. Their values also
  # match the non-VITE SUPABASE_* function env vars, which tripped Netlify's
  # secrets scanner and failed the build — tell it these keys are not secrets.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Runway: weekday-morning board scan (12:00 UTC ≈ 7am ET); inert until
# SUPABASE_SERVICE_ROLE_KEY is set — see netlify/functions/scan-cron.mjs
[functions."scan-cron"]
  schedule = "0 12 * * 1-5"

# Specific rewrites must resolve BEFORE the SPA catch-all.
# Clarify tracked links / open pixel:
[[redirects]]
  from = "/r/*"
  to = "/.netlify/functions/track-click/:splat"
  status = 200

[[redirects]]
  from = "/px/*"
  to = "/.netlify/functions/track-open/:splat"
  status = 200

# Runway convenience alias:
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all remaining routes serve the shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
